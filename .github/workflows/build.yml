name: Build Mania

on:
  push:
    paths:
      - dependencies/**
      - SonicMania/**
      - .github/workflows/build.yml
      - CMakeLists.txt
    branches:
      - master
  workflow_dispatch: # Added so you can also trigger this build manually

env:
  GENERAL_FLAGS: "-DWITH_RSDK=OFF -DCMAKE_BUILD_TYPE=Release"
  V5_FLAGS: "-DRETRO_REVISION=2"
  V5U_FLAGS: "-DRETRO_REVISION=3"
  GENERAL_WIN_FLAGS: "-DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake"
  WIN32_FLAGS: "-DVCPKG_TARGET_TRIPLET=x86-windows-static -A Win32"
  WIN64_FLAGS: "-DVCPKG_TARGET_TRIPLET=x64-windows-static"

jobs:
  mania-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Build Mania
        run: |
          cmake -B build_v5 ${{env.GENERAL_FLAGS}} ${{env.GENERAL_WIN_FLAGS}} ${{env.WIN32_FLAGS}} ${{env.V5_FLAGS}}
          cmake --build build_v5 --parallel --config Release
          cmake -B build_v5U ${{env.GENERAL_FLAGS}} ${{env.GENERAL_WIN_FLAGS}} ${{env.WIN32_FLAGS}} ${{env.V5U_FLAGS}}
          cmake --build build_v5U --parallel --config Release
      - name: Move artifacts
        run: |
          mkdir artifacts
          mkdir artifacts/v5
          mkdir artifacts/v5U
          mv ./build_v5/Release/*.dll ./artifacts/v5/
          mv ./build_v5U/Release/*.dll ./artifacts/v5U/
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mania-windows
          path: artifacts

  mania-windows-x64:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Build Mania
        run: |
          cmake -B build_v5 ${{env.GENERAL_FLAGS}} ${{env.GENERAL_WIN_FLAGS}} ${{env.WIN64_FLAGS}} ${{env.V5_FLAGS}}
          cmake --build build_v5 --parallel --config Release
          cmake -B build_v5U ${{env.GENERAL_FLAGS}} ${{env.GENERAL_WIN_FLAGS}} ${{env.WIN64_FLAGS}} ${{env.V5U_FLAGS}}
          cmake --build build_v5U --parallel --config Release
      - name: Move artifacts
        run: |
          mkdir artifacts
          mkdir artifacts/v5
          mkdir artifacts/v5U
          mv ./build_v5/Release/*.dll ./artifacts/v5/
          mv ./build_v5U/Release/*.dll ./artifacts/v5U/
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mania-windows-x64
          path: artifacts

  mania-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Build Mania
        run: |
          cmake -B build_v5 ${{env.GENERAL_FLAGS}} ${{env.V5_FLAGS}}
          cmake --build build_v5 --parallel
          cmake -B build_v5U ${{env.GENERAL_FLAGS}} ${{env.V5U_FLAGS}}
          cmake --build build_v5U --parallel
      - name: Move artifacts
        run: |
          mkdir artifacts
          mkdir artifacts/v5
          mkdir artifacts/v5U
          mv ./build_v5/lib*.so ./artifacts/v5/
          mv ./build_v5U/lib*.so ./artifacts/v5U/
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mania-linux
          path: artifacts

  mania-android-shared-objects:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Android NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c

      - name: Build ARM64 Shared Object
        run: |
          cmake -B build_arm64 \
            -DCMAKE_TOOLCHAIN_FILE=${{ steps.setup-ndk.outputs.ndk-path }}/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-21 \
            -DCMAKE_BUILD_TYPE=Release \
            -DWITH_RSDK=OFF \
            -DRETRO_REVISION=3
          cmake --build build_arm64 --parallel

      - name: Build ARMv7 Shared Object
        run: |
          cmake -B build_armv7 \
            -DCMAKE_TOOLCHAIN_FILE=${{ steps.setup-ndk.outputs.ndk-path }}/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=armeabi-v7a \
            -DANDROID_PLATFORM=android-21 \
            -DCMAKE_BUILD_TYPE=Release \
            -DWITH_RSDK=OFF \
            -DRETRO_REVISION=3
          cmake --build build_armv7 --parallel

      - name: Prepare Artifacts Layout
        run: |
          mkdir -p artifacts/arm64-v8a
          mkdir -p artifacts/armeabi-v7a
          cp build_arm64/libGame.so ./artifacts/arm64-v8a/ || cp build_arm64/lib*.so ./artifacts/arm64-v8a/
          cp build_armv7/libGame.so ./artifacts/armeabi-v7a/ || cp build_armv7/lib*.so ./artifacts/armeabi-v7a/

      - name: Upload Both Architectures
        uses: actions/upload-artifact@v4
        with:
          name: mania-android-so-files
          path: artifacts/
